# electron-builder — PS Terminal desktop packaging.
#
# Windows build (on Windows or the desktop.yml CI runner):
#   pyinstaller --clean --noconfirm desktop/engine.spec
#   npm run build:desktop
#   npx electron-builder --win
# Artifacts in release/: "PS Terminal Setup <version>.exe" (NSIS wizard) and
# "PS Terminal <version> Portable.exe".

appId: com.prabalslathia.psterminal
productName: PS Terminal
copyright: © Prabal Slathia

directories:
  output: release
  buildResources: desktop/build-res   # icon.ico / icon.svg / png set

# The app payload: the desktop shell + the built renderer + brand icons.
# Renderer deps are devDependencies (vite inlines them), so node_modules
# ships only electron-log.
files:
  - electron/**/*
  - dist-desktop/**/*
  - desktop/build-res/png/icon-256.png
  - package.json
  - "!**/*.map"

# The PyInstaller-frozen market engine rides outside the asar so it can exec.
extraResources:
  - from: dist/volara-engine
    to: engine

asar: true

win:
  icon: desktop/build-res/icon.ico
  target:
    - nsis
    - portable
  artifactName: "PS Terminal ${version} Portable.exe"

nsis:
  artifactName: "PS Terminal Setup ${version}.exe"
  shortcutName: PS Terminal
  uninstallDisplayName: PS Terminal — Quantitative Trading Systems
  installerIcon: desktop/build-res/icon.ico
  uninstallerIcon: desktop/build-res/icon.ico
  oneClick: false                        # professional wizard, not silent
  perMachine: false                      # per-user: no UAC, writable install dir
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  runAfterFinish: true
  deleteAppDataOnUninstall: false        # keep window state/logs unless asked

# Local smoke target only (CI builds Windows artifacts).
linux:
  icon: desktop/build-res/png/icon-512.png
  target:
    - dir
