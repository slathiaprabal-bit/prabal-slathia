<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>VOLARA</title>
<style>
  :root {
    --bg: #0a0a0b; --text: #f4f5f8; --dim: #9096a3; --faint: #565b66;
    --accent: #8b5cf6; --glow: rgba(124, 92, 255, 0.3);
  }
  * { box-sizing: border-box; margin: 0; user-select: none; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background:
      radial-gradient(90% 60% at 50% -10%, rgba(124, 92, 255, 0.10), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex; align-items: center; justify-content: center;
    -webkit-app-region: drag;
    border: 1px solid rgba(255, 255, 255, 0.06);
  }
  .card { text-align: center; }
  .mark {
    width: 64px; height: 64px; margin: 0 auto 18px;
    border-radius: 16px;
    background: linear-gradient(155deg, #8b5cf6 0%, #6d47e8 55%, #4c2fb8 100%);
    box-shadow: 0 14px 40px rgba(124, 92, 255, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 26px; color: #fff; letter-spacing: -1px;
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  h1 { font-size: 22px; font-weight: 900; letter-spacing: 0.14em; }
  .sub { margin-top: 4px; font-size: 9px; letter-spacing: 0.42em; color: var(--faint); font-weight: 600; }
  .bar {
    margin: 26px auto 14px; width: 220px; height: 3px; border-radius: 3px;
    background: rgba(255, 255, 255, 0.07); overflow: hidden; position: relative;
  }
  .bar::after {
    content: ''; position: absolute; inset: 0; width: 40%;
    border-radius: 3px; background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: sweep 1.4s ease-in-out infinite;
  }
  @keyframes sweep { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
  #stage { font-size: 11.5px; color: var(--dim); min-height: 16px; transition: opacity 0.25s; }
  .ver { margin-top: 20px; font-size: 9px; color: var(--faint); letter-spacing: 0.1em; }
</style>
</head>
<body>
  <div class="card">
    <div class="mark">V</div>
    <h1>VOLARA</h1>
    <div class="sub">QUANT TERMINAL</div>
    <div class="bar"></div>
    <div id="stage">Starting…</div>
    <div class="ver">v3.0</div>
  </div>
  <script>
    const el = document.getElementById('stage');
    if (window.splash) {
      window.splash.onStage((msg) => {
        el.style.opacity = '0';
        setTimeout(() => { el.textContent = msg; el.style.opacity = '1'; }, 140);
      });
    }
  </script>
</body>
</html>
